name: PitchBlack Recovery Project Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'PBRP Manifest Branch'
        required: true
        default: 'android-11.0'
        type: choice
        options:
        - android-14.0
        - android-12.1
        - android-11.0
        - android-10.0
        - android-9.0
        - android-8.1
        - android-7.1
        - android-6.0
      DEVICE_TREE:
        description: 'Custom Recovery Tree URL'
        required: true
        default: 'https://github.com/uratsakidogi1488/WP15_TWRP'
      DEVICE_TREE_BRANCH:
        description: falseree Branch (optioptiona
        required: true
        default: 'main'
      BUILD_TARGET:
        description: 'Build Target (use "pbrp" for Android 11+)'
        required: true
        default: 'pbrp'
        type: choice
        options:
        - pbrp
        - recovery
        - boot
        - vendorboot
      LDCHECK_PATH:
        description: 'Path for dependency check (optional)'
        required: false
        default: 'recovery/root/system/bin/qseecomd'

jobs:
  build:
    name: Build PBRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      DEBIAN_FRONTEND: noninteractive
    permissions:
      contents: write
      
    steps:
    - name: Initial Setup
      run: |
        echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV
        echo "BUILD_DATE=$(TZ=UTC date +%Y%m%d)" >> $GITHUB_ENV
        
    - name: Checkout
      uses: actions/checkout@v6

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space   # Easier
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Prepare device tree
      run: |
        set -euo pipefail
        echo "Preparing device tree from: '${{ inputs.DEVICE_TREE }}'"

        INPUT="${{ inputs.DEVICE_TREE }}"

        # If input is empty or placeholder, try to auto-detect a device tree inside the checked-out repository
        if [ -z "$INPUT" ] || [ "$INPUT" = "https://github.com/enter_username/repo_name" ]; then
          echo "DEVICE_TREE input empty or placeholder — attempting to auto-detect device tree in repository..."

          # look for common Android device tree files under device/*/*
          DETECTED=$(find . -type f \( -name Android.mk -o -name Android.bp -o -name BoardConfig.mk -o -iname "device.mk" \) -path "./device/*/*" -printf '%h\n' | sort -u | head -n1 || true)

          if [ -n "$DETECTED" ]; then
            echo "Found device tree at $DETECTED"
            # export relative path to workspace
            echo "DEVICE_TREE_PATH=$GITHUB_WORKSPACE/$DETECTED" >> $GITHUB_ENV
          else
            echo "No local device tree detected. Please provide DEVICE_TREE input or add a device tree to the repo."
            echo "ERROR: DEVICE_TREE not set or using placeholder. Set DEVICE_TREE to a valid GitHub repo URL or owner/repo." >&2
            exit 1
          fi

        else

          # normalize input: accept either full URL or owner/repo
          if echo "$INPUT" | grep -E '^([^/]+/[^/]+)$' >/dev/null 2>&1; then
            OWNER_REPO="$INPUT"
            DEVICE_URL="https://github.com/$OWNER_REPO.git"
          else
            # strip possible .git and trailing slash, then ensure .git suffix for cloning
            DEVICE_URL=$(echo "$INPUT" | sed -E 's#(https://github.com/[^/]+/[^/]+)(\.git)?/*#\1.git#')
            OWNER_REPO=$(echo "$DEVICE_URL" | sed -E 's#https://github.com/([^/]+/[^/]+)\.git#\1#')
          fi

          echo "Checking access to $DEVICE_URL"

          # try public access first
          if git ls-remote "$DEVICE_URL" HEAD >/dev/null 2>&1; then
            echo "Public repo accessible, cloning $DEVICE_URL"
            git clone --depth=1 "$DEVICE_URL" tmp_device_tree
          else
            if [ -n "${{ secrets.PERSONAL_ACCESS_TOKEN }}" ]; then
              echo "Public access failed — trying with PERSONAL_ACCESS_TOKEN"
              git clone --depth=1 "https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${OWNER_REPO}.git" tmp_device_tree
            else
              echo "ERROR: Cannot access $DEVICE_URL and no PERSONAL_ACCESS_TOKEN secret provided" >&2
              exit 1
            fi
          fi

          echo "DEVICE_TREE_PATH=./tmp_device_tree" >> $GITHUB_ENV
        fi

    - name: Build PitchBlack Recovery
      uses: mlm-games/pitchblack-pbrp-builder-action@main
      id: build
      with:
        MANIFEST_BRANCH: ${{ inputs.MANIFEST_BRANCH }}
        DEVICE_TREE:  ${{ env.DEVICE_TREE_PATH }}
        DEVICE_TREE_BRANCH:  ${{ inputs.DEVICE_TREE_BRANCH }}
        BUILD_TARGET:  ${{ inputs.BUILD_TARGET }}
  
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      if: inputs.upload_releases == false || github.event_name != 'workflow_dispatch'
      with:
        name: PBRP-Recovery-${{ env.DEVICE_NAME }}-${{ env.BUILD_DATE }}
        path: |
          ${{ env.OUTPUT_DIR }}/*.img
          ${{ env.OUTPUT_DIR }}/*.tar
          ${{ env.OUTPUT_DIR }}/*vbmeta*
          ${{ env.OUTPUT_DIR }}/*.cpio

    - name: Upload to Release
      if: success()
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ${{ env.OUTPUT_DIR }}/*.img
          ${{ env.OUTPUT_DIR }}/PBRP*.zip
        name: PBRP for ${{ inputs.DEVICE_NAME }} - ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          ## Build Information
          - **Build Date:** ${{ env.BUILD_DATE }}
          - **Branch:** ${{ inputs.MANIFEST_BRANCH }}
          - **Device:** ${{ inputs.DEVICE_NAME }}
          - **Build Type:** ${{ inputs.BUILD_TARGET }}
          
          ## Source Information
          - **Device Tree:** [${{ inputs.DEVICE_TREE }}](${{ inputs.DEVICE_TREE }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
          - **Branch:** ${{ inputs.DEVICE_TREE_BRANCH }}
          
          ## Build Status
          - Recovery Image MD5: `${{ env.MD5_IMG }}`
          - ZIP Package MD5: `${{ env.MD5_ZIP }}`
          
          > Note: This is an automated build. Please test thoroughly before using.
        prerelease: false
        draft: false

    - name: Run LDCHECK
      uses: mlm-games/ldcheck-action@main
      with:
        OUTPUT_DIR: ${{ env.OUTPUT_DIR }}
        LDCHECKPATH: ${{ inputs.LDCHECK_PATH }}
      continue-on-error: true

    - name: Calculate Build Time
      if: always()
      run: |
        BUILD_END=$(date +%s)
        BUILD_DURATION=$((BUILD_END - BUILD_START))
        
        hours=$((BUILD_DURATION / 3600))
        minutes=$(((BUILD_DURATION % 3600) / 60))
        seconds=$((BUILD_DURATION % 60))
        
        echo "Build completed in ${hours}h ${minutes}m ${seconds}s"
        
        # Save build statistics
        echo "BUILD_DURATION=${BUILD_DURATION}" >> $GITHUB_ENV
        echo "BUILD_HOURS=${hours}" >> $GITHUB_ENV
        echo "BUILD_MINUTES=${minutes}" >> $GITHUB_ENV
        echo "BUILD_SECONDS=${seconds}" >> $GITHUB_ENV

    - name: Cleanup Workspace
      if: always()
      run: |
        cd ${{ github.workspace }}
        rm -rf android-recovery
        df -h
